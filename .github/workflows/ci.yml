name: Validate

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Start built Pages artifact preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/pages-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/browser-dev-workbench/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          sed -n '1,200p' /tmp/pages-preview.log
          exit 1
      - name: Verify built Pages browser smoke
        run: npm run test:pages:browser -- http://127.0.0.1:4173/browser-dev-workbench/
      - name: Verify unavailable runtime keeps the editor usable
        run: npm run test:pages:browser:unavailable -- http://127.0.0.1:4173/browser-dev-workbench/
      - name: Verify selected-folder diagnostic stays user initiated
        run: npm run test:pages:browser:folder -- http://127.0.0.1:4173/browser-dev-workbench/

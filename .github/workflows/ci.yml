name: Validate and production candidate

on:
  pull_request:
    types: [closed, opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  validate:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate

  candidate_build:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          name: candidate-github-pages

  candidate_deploy:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    needs: candidate_build
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy pull-request candidate to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: candidate-github-pages

  candidate_deploy_retry:
    if: >-
      always() && github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.candidate_build.result == 'success' && needs.candidate_deploy.result == 'failure'
    needs: [candidate_build, candidate_deploy]
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Retry pull-request candidate deployment to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: candidate-github-pages

  verify_candidate:
    if: >-
      always() && github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (needs.candidate_deploy.result == 'success' || needs.candidate_deploy_retry.result == 'success')
    needs: [candidate_deploy, candidate_deploy_retry]
    runs-on: ubuntu-latest
    env:
      CANDIDATE_PAGE_URL: ${{ needs.candidate_deploy.result == 'success' && needs.candidate_deploy.outputs.page_url || needs.candidate_deploy_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify deployed Pages resources
        run: node scripts/verify-pages.mjs "$CANDIDATE_PAGE_URL"
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify deployed Pages browser smoke
        run: >-
          npm run test:pages:browser -- "$CANDIDATE_PAGE_URL"
          --evidence-dir acceptance-evidence/capability-loop
          --target-commit "${{ github.sha }}"
      - name: Verify unavailable runtime keeps the editor usable
        run: >-
          npm run test:pages:browser:unavailable -- "$CANDIDATE_PAGE_URL"
          --evidence-dir acceptance-evidence/unavailable-runtime
          --target-commit "${{ github.sha }}"
      - name: Verify selected-folder diagnostic stays user initiated
        run: >-
          npm run test:pages:browser:folder -- "$CANDIDATE_PAGE_URL"
          --evidence-dir acceptance-evidence/folder-diagnostic-stub
          --target-commit "${{ github.sha }}"
      - name: Upload browser acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-acceptance-${{ github.run_id }}-${{ github.job }}
          path: acceptance-evidence
          if-no-files-found: warn
          retention-days: 14

  rollback_candidate:
    if: >-
      always() && github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (needs.validate.result == 'failure' || needs.candidate_build.result == 'failure' ||
      (needs.candidate_deploy.result == 'failure' && needs.candidate_deploy_retry.result == 'failure') ||
      needs.verify_candidate.result == 'failure')
    needs: [validate, candidate_build, candidate_deploy, candidate_deploy_retry, verify_candidate]
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/checkout@v4
        with:
          ref: main
          path: restored-main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            restored-main/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: restored-main
      - run: npm run build
        working-directory: restored-main
      - name: Record restored main commit
        id: restored_main
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        working-directory: restored-main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: restored-main/dist
          name: rollback-github-pages
      - name: Restore main to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: rollback-github-pages
      - name: Verify restored Pages resources
        run: node scripts/verify-pages.mjs "${{ steps.deployment.outputs.page_url }}"
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify restored Pages browser smoke
        run: >-
          npm run test:pages:browser -- "${{ steps.deployment.outputs.page_url }}"
          --evidence-dir acceptance-evidence/capability-loop
          --target-commit "${{ steps.restored_main.outputs.sha }}"
      - name: Verify restored unavailable runtime keeps the editor usable
        run: >-
          npm run test:pages:browser:unavailable -- "${{ steps.deployment.outputs.page_url }}"
          --evidence-dir acceptance-evidence/unavailable-runtime
          --target-commit "${{ steps.restored_main.outputs.sha }}"
      - name: Verify restored selected-folder diagnostic stays user initiated
        run: >-
          npm run test:pages:browser:folder -- "${{ steps.deployment.outputs.page_url }}"
          --evidence-dir acceptance-evidence/folder-diagnostic-stub
          --target-commit "${{ steps.restored_main.outputs.sha }}"
      - name: Upload restored browser acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-acceptance-${{ github.run_id }}-${{ github.job }}
          path: acceptance-evidence
          if-no-files-found: warn
          retention-days: 14

  restore_after_close:
    if: >-
      github.event.action == 'closed' && !github.event.pull_request.merged &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/checkout@v4
        with:
          ref: main
          path: restored-main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            restored-main/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: restored-main
      - run: npm run build
        working-directory: restored-main
      - name: Record restored main commit
        id: restored_main
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        working-directory: restored-main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: restored-main/dist
          name: restore-github-pages
      - name: Restore main after closing an unmerged pull request
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: restore-github-pages
      - name: Verify restored Pages resources
        run: node scripts/verify-pages.mjs "${{ steps.deployment.outputs.page_url }}"
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify restored Pages browser smoke
        run: >-
          npm run test:pages:browser -- "${{ steps.deployment.outputs.page_url }}"
          --evidence-dir acceptance-evidence/capability-loop
          --target-commit "${{ steps.restored_main.outputs.sha }}"
      - name: Verify restored unavailable runtime keeps the editor usable
        run: >-
          npm run test:pages:browser:unavailable -- "${{ steps.deployment.outputs.page_url }}"
          --evidence-dir acceptance-evidence/unavailable-runtime
          --target-commit "${{ steps.restored_main.outputs.sha }}"
      - name: Verify restored selected-folder diagnostic stays user initiated
        run: >-
          npm run test:pages:browser:folder -- "${{ steps.deployment.outputs.page_url }}"
          --evidence-dir acceptance-evidence/folder-diagnostic-stub
          --target-commit "${{ steps.restored_main.outputs.sha }}"
      - name: Upload close-restoration browser acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-acceptance-${{ github.run_id }}-${{ github.job }}
          path: acceptance-evidence
          if-no-files-found: warn
          retention-days: 14

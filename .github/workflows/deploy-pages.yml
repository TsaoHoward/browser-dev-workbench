name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Verify deployed Pages resources
        run: node scripts/verify-pages.mjs "${{ needs.deploy.outputs.page_url }}"
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify deployed Pages browser smoke
        run: >-
          npm run test:pages:browser -- "${{ needs.deploy.outputs.page_url }}"
          --evidence-dir acceptance-evidence/capability-loop
          --target-commit "${{ github.sha }}"
      - name: Verify unavailable runtime keeps the editor usable
        run: >-
          npm run test:pages:browser:unavailable -- "${{ needs.deploy.outputs.page_url }}"
          --evidence-dir acceptance-evidence/unavailable-runtime
          --target-commit "${{ github.sha }}"
      - name: Verify selected-folder diagnostic stays user initiated
        run: >-
          npm run test:pages:browser:folder -- "${{ needs.deploy.outputs.page_url }}"
          --evidence-dir acceptance-evidence/folder-diagnostic-stub
          --target-commit "${{ github.sha }}"
      - name: Upload browser acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-acceptance-${{ github.run_id }}-${{ github.job }}
          path: acceptance-evidence
          if-no-files-found: warn
          retention-days: 14
